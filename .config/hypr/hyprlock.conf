# hyprlock.conf - Configured with Tokyo Night Colors

source = ~/.config/hypr/hyprlock-local.conf

$font = CaskaydiaMono Nerd Font

general {
    hide_cursor = false
}

animations {
    enabled = true
    bezier = linear, 1, 1, 0, 0
    animation = fadeIn, 1, 5, linear
    animation = fadeOut, 1, 5, linear
    animation = inputFieldDots, 1, 2, linear
}

background {
    monitor =
    path = screenshot
    blur_passes = 3
}

input-field {
    monitor = $main_monitor
    size = 20%, 5%
    outline_thickness = 3
    inner_color = rgba(41, 46, 66, 0.8) # Waybar module bg

    # Borders mapped to theme states
    outer_color = rgba(122, 162, 247, 1.0) # #7aa2f7 (Blue)
    check_color = rgba(224, 175, 104, 1.0) # #e0af68 (Yellow)
    fail_color = rgba(247, 118, 142, 1.0)  # #f7768e (Red)

    font_color = rgb(192, 202, 245) # #c0caf5
    fade_on_empty = false
    rounding = 8 # Matches waybar module radius

    font_family = $font
    placeholder_text = Input password...
    fail_text = $PAMFAIL

    dots_spacing = 0.3

    position = 0, -20
    halign = center
    valign = center
}

# TIME (Matches Waybar Clock)
label {
    monitor = $main_monitor
    text = $TIME
    color = rgb(122, 162, 247) # #7aa2f7
    font_size = 90
    font_family = $font

    position = 0, -250
    halign = center
    valign = top
}

# DATE
label {
    monitor = $main_monitor
    text = cmd[update:60000] date +"%A, %d %B %Y"
    color = rgb(192, 202, 245) # #c0caf5
    font_size = 25
    font_family = $font

    position = 0, -400
    halign = center
    valign = top
}
